apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - ../../policies/network
  - ../../policies/rbac
images:
  - name: payflow-api
    newName: ghcr.io/payflow/payflow-api
    newTag: dev
  - name: payflow-worker
    newName: ghcr.io/payflow/payflow-worker
    newTag: dev
patches:
  - path: patch-ingress-host.yaml
  - path: patch-hpa.yaml
  - path: patch-workload-identity.yaml
  - path: patch-deploy-resources.yaml
