# Egress for Postgres, Redis, DNS, and HTTPS merchant webhooks. Tighten CIDRs when private endpoints are fixed.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: payflow-app-egress
  labels:
    app.kubernetes.io/part-of: payflow
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: payflow
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
